<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gold Price Live</title>
</head>
<body>

  <h1>Gold Price Live</h1>

  <h2 id="price">Waiting...</h2>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <script>
    const socket = io("http://localhost:5000");

    socket.on("connect", () => {
      console.log("Connected");
    });

    socket.on("goldPrice", (data) => {
      console.log(data);

      document.getElementById("price").innerText =
        data.price;
    });
  </script>

</body>
</html>
